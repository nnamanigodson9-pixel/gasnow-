function GPSMap({order,onClose}){
  const mapRef=useRef(null);const mapObj=useRef(null);const rMark=useRef(null);

  const rider=RIDERS.find(r=>r.name===order.rider)||RIDERS[0];
  const dLat=6.1980,dLng=6.7340;
  useEffect(()=>{
    if(mapObj.current||!mapRef.current)return;
    const lnk=document.createElement("link");lnk.rel="stylesheet";lnk.href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css";document.head.appendChild(lnk);
    const sc=document.createElement("script");sc.src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
    sc.onload=()=>{
      const L=window.L;
      const map=L.map(mapRef.current,{zoomControl:false}).setView([rider.lat,rider.lng],14);

function CardPayment({total,onSuccess,onCancel}){
  const [f,setF]=useState({num:"",name:"",exp:"",cvv:""});
  const [processing,setProcessing]=useState(false);
  const [err,setErr]=useState("");
  const up=k=>e=>{
    let v=e.target.value;
    if(k==="num")v=v.replace(/\D/g,"").slice(0,16).replace(/(.{4})/g,"$1 ").trim();
    if(k==="exp")v=v.replace(/\D/g,"").slice(0,4).replace(/^(\d{2})(\d)/,"$1/$2");
    if(k==="cvv")v=v.replace(/\D/g,"").slice(0,4);
    setF(p=>({...p,[k]:v}));
  };
  const getCardBrand=num=>{const n=num.replace(/\s/g,"");if(/^4/.test(n))return{name:"Visa",color:"#1a1f71"};if(/^5[1-5]|^2[2-7]/.test(n))return{name:"Mastercard",color:"#eb001b"};if(/^6/.test(n))return{name:"Verve",color:"#00a651"};return{name:"Card",color:"#64748b"};};
  const brand=getCardBrand(f.num);
  const pay=()=>{
    setErr("");
    if(f.num.replace(/\s/g,"").length<16)return setErr("Enter a valid 16-digit card number");

          <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Auto-Calculated Prices</div>
          {CYLS.map(g=>(
            <div key={g.id} className="card" style={{padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:11,border:g.prem?"2px solid "+BRAND:"1px solid #f1f5f9"}}>
              <span style={{fontSize:24}}>{g.icon}</span>
              <div style={{flex:1}}><div style={{fontWeight:800,fontSize:13,color:"#0f172a"}}>{g.lb} Cylinder</div><div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>{fmt(ppk)} × {g.kg}kg{g.prem&&<span style={{color:BRAND,fontWeight:700}}> · FREE delivery + 2% credit</span>}</div></div>
              <div style={{fontWeight:900,fontSize:16,color:BRAND}}>{fmt(calcP(g.kg,ppk))}</div>
            </div>
          ))}
          <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:12,padding:"12px 14px",marginTop:10}}>
            <div style={{fontSize:11,fontWeight:800,color:"#92400e",marginBottom:8,textTransform:"uppercase",letterSpacing:.3}}>🎟️ Active Promo Codes</div>
            {Object.entries(PROMOS).map(([code,p])=>(
              <div key={code} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"5px 0",borderBottom:"1px solid #fed7aa"}}><b style={{color:BRAND_DARK,fontFamily:"monospace"}}>{code}</b><span style={{color:"#78350f"}}>{p.label}</span></div>
            ))}
          </div>
        </>}

        {tab==="analytics"&&<>
          <h2 style={{fontSize:17,fontWeight:900,margin:"0 0 12px",color:"#0f172a"}}>Analytics</h2>
          <BarChart/>
          <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:12}}>
            {[["🏆","Best Day","Saturday","₦64,000","#ea580c"],["📦","Avg Order",fmt(Math.round(stats.rev/Math.max(1,delivered.length))),"per order","#3b82f6"],["⭐","Rating",avgRat+"/5","avg score","#f59e0b"],["👥","Customers",customers.length,"in Asaba","#16a34a"]].map(([ic,t,v,sub,c])=>(
              <div key={t} className="card" style={{padding:12,borderLeft:"3px solid "+c}}>
                <div style={{fontSize:18,marginBottom:3}}>{ic}</div>
                <div style={{fontSize:10,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:.3,marginBottom:2}}>{t}</div>
                <div style={{fontSize:16,fontWeight:900,color:c}}>{v}</div>
                <div style={{fontSize:10,color:"#94a3b8"}}>{sub}</div>
              </div>
            ))}
          </div>
          <div className="card" style={{padding:14,marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:800,color:"#0f172a",marginBottom:12,textTransform:"uppercase",letterSpacing:.3}}>📦 Orders by Cylinder Size</div>
            {CYLS.map(g=>{const cnt=orders.filter(o=>o.kg===g.kg).length;const pct=Math.round(cnt/Math.max(1,orders.length)*100);return(
              <div key={g.id} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4,color:"#374151"}}><span>{g.icon} {g.lb}</span><span style={{fontWeight:700}}>{cnt} orders ({pct}%)</span></div>
                <div className="bar"><div className="bar-fill" style={{width:pct+"%"}}/></div>
              </div>
            );})}
          </div>
          <div className="card" style={{padding:14}}>
            <div style={{fontSize:11,fontWeight:800,color:"#0f172a",marginBottom:12,textTransform:"uppercase",letterSpacing:.3}}>🏍️ Rider Performance — Asaba</div>
            {RIDERS.filter(r=>r.active).map(r=>{const done=orders.filter(o=>o.rider===r.name&&o.status==="Delivered").length;const pct=Math.max(3,Math.round(done/Math.max(1,orders.length)*100));return(
              <div key={r.name} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4,color:"#374151"}}><span>🏍️ {r.name} <span style={{color:"#94a3b8",fontSize:10}}>({r.area})</span></span><span style={{fontWeight:700}}>{done} deliveries</span></div>
                <div className="bar"><div className="bar-fill" style={{width:pct+"%"}}/></div>
              </div>
            );})}
          </div>
        </>}
      </div>
    </div>
  );
}

function App(){
  const [user,setUser]=useState(null);
  const [ppk,setPpk]=useState(800);
  const [orders,setOrders]=useState(INIT_ORDERS);
  const [comments,setComments]=useState(INIT_COMMENTS);
  if(!user)return <Auth onLogin={setUser}/>;
  if(user.role==="admin")return <Admin onLogout={()=>setUser(null)} orders={orders} setOrders={setOrders} ppk={ppk} setPpk={setPpk} comments={comments} setComments={setComments}/>;
  return <Customer user={user} onLogout={()=>setUser(null)} orders={orders} setOrders={setOrders} ppk={ppk} comments={comments} setComments={setComments}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
